name: Build eDonish Auto — Go + Fyne

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════════════════════════════
  # PREPARE: Read version from config
  # ═══════════════════════════════════════════════════════════════
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from config
        id: version
        run: |
          VERSION=$(grep 'AppVersion' edonish-auto/internal/config/config.go | awk -F'"' '{print $2}')
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Linux binary + .deb + .rpm
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libxtst-dev \
            libgtk-3-dev libgdk-pixbuf2.0-dev libgl1-mesa-dev \
            libdbus-1-dev libatk1.0-dev libatk-bridge2.0-dev \
            libatspi2.0-dev rpm dpkg-dev \
            gcc libc6-dev

      - name: Build Linux binary
        run: |
          cd edonish-auto
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${{ env.APP_VERSION }}" -o ../dist/linux/edonish-auto .

      - name: Report binary size
        run: |
          chmod +x dist/linux/edonish-auto
          SIZE=$(du -h dist/linux/edonish-auto | cut -f1)
          echo "Linux binary size: $SIZE"

      - name: Build .deb package
        run: |
          mkdir -p dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64/DEBIAN
          mkdir -p dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64/usr/bin
          mkdir -p dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64/usr/share/applications
          cp dist/linux/edonish-auto dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64/usr/bin/
          cat > dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64/DEBIAN/control << EOF
          Package: edonish-auto
          Version: ${{ env.APP_VERSION }}
          Architecture: amd64
          Maintainer: 4code <4codegit@github.com>
          Description: eDonish Auto — Automated grade management for edonish.tj
          Section: education
          Priority: optional
          Depends: libgtk-3-0, libgdk-pixbuf2.0-0, libgl1, libx11-6, libxext6, libxrender1, libxrandr2, libxinerama1, libxcursor1, libxi6, libxtst6, libdbus-1-3
          EOF
          cat > dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64/usr/share/applications/edonish-auto.desktop << EOF
          [Desktop Entry]
          Name=eDonish Auto
          Comment=Automated grade management for edonish.tj
          Exec=edonish-auto
          Icon=edonish-auto
          Terminal=false
          Type=Application
          Categories=Education;
          EOF
          dpkg-deb --build dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64
          mv dist/deb/edonish-auto_${{ env.APP_VERSION }}_amd64.deb dist/deb/

      - name: Build .rpm package
        run: |
          mkdir -p dist/rpm/BUILD dist/rpm/SOURCES dist/rpm/SPECS
          cp dist/linux/edonish-auto dist/rpm/BUILD/
          cat > dist/rpm/SPECS/edonish-auto.spec << 'EOF'
          Name: edonish-auto
          Version: ${{ env.APP_VERSION }}
          Release: 1
          Summary: eDonish Auto — Automated grade management for edonish.tj
          License: MIT
          Group: Applications/Education
          %description
          Automated grade management for edonish.tj
          %install
          mkdir -p %{buildroot}/usr/bin
          cp %{_builddir}/edonish-auto %{buildroot}/usr/bin/
          chmod +x %{buildroot}/usr/bin/edonish-auto
          %files
          /usr/bin/edonish-auto
          EOF
          rpmbuild --define "_topdir $(pwd)/dist/rpm" -bb dist/rpm/SPECS/edonish-auto.spec
          cp dist/rpm/RPMS/x86_64/*.rpm dist/rpm/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-linux
          path: |
            dist/deb/*.deb
            dist/rpm/*.rpm

  # ═══════════════════════════════════════════════════════════════
  # BUILD: Windows .exe
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install MinGW dependencies
        run: |
          choco install mingw -y
        shell: pwsh

      - name: Build Windows binary
        run: |
          cd edonish-auto
          $env:CGO_ENABLED="1"
          $env:CC="gcc"
          go build -ldflags "-s -w -H windowsgui -X main.version=${{ env.APP_VERSION }}" -o ../dist/windows/edonish-auto.exe .
        shell: pwsh

      - name: Report binary size
        run: |
          $size = (Get-Item dist\windows\edonish-auto.exe).Length / 1MB
          Write-Host "Windows binary size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Create ZIP package
        run: |
          Compress-Archive -Path dist\windows\edonish-auto.exe -DestinationPath dist\windows\edonish-auto-${{ env.APP_VERSION }}-windows.zip -Force
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: dist/windows/edonish-auto-${{ env.APP_VERSION }}-windows.zip

  # ═══════════════════════════════════════════════════════════════
  # BUILD: macOS .app + .zip
  # ═══════════════════════════════════════════════════════════════
  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build macOS binary
        run: |
          cd edonish-auto
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${{ env.APP_VERSION }}" -o ../dist/macos/edonish-auto .

      - name: Report binary size
        run: |
          chmod +x dist/macos/edonish-auto
          SIZE=$(du -h dist/macos/edonish-auto | cut -f1)
          echo "macOS binary size: $SIZE"

      - name: Create ZIP package
        run: |
          cd dist/macos
          zip edonish-auto-${{ env.APP_VERSION }}-macos.zip edonish-auto

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-macos
          path: dist/macos/edonish-auto-${{ env.APP_VERSION }}-macos.zip

  # ═══════════════════════════════════════════════════════════════
  # RELEASE: Create GitHub Release with all binaries
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: [prepare, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List all artifacts
        run: find release-artifacts -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eDonish Auto v${{ env.APP_VERSION }}
          body: |
            ## eDonish Auto v${{ env.APP_VERSION }} — Go + Fyne

            Автоматизация электронного журнала edonish.tj

            ### Что нового:
            - 🚀 Полная переработка на Go + Fyne
            - 🎓 Движок автооценки с concurrent-воркерами
            - 📊 Просмотр журнала с анализом ученика
            - ✏️ Редактирование/удаление оценок
            - 🎯 Пределы оценок по ученикам
            - 🔐 Сохранение сессии (JWT/refresh token)
            - 🏫 Мультишкольная поддержка (role-based API)

            ### Установка:
            - **Windows**: Скачайте `edonish-auto-*-windows.zip`, распакуйте и запустите `edonish-auto.exe`
            - **Linux (Ubuntu/Debian)**: `sudo dpkg -i edonish-auto_*.deb`
            - **Linux (Fedora/RHEL)**: `sudo rpm -i edonish-auto-*.rpm`
            - **macOS**: Распакуйте `edonish-auto-*-macos.zip`

          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
