name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            output: edonish-auto
          - os: ubuntu-latest
            target: linux-arm64
            output: edonish-auto-arm64
          - os: windows-latest
            target: windows-amd64
            output: edonish-auto.exe
          - os: macos-latest
            target: macos-amd64
            output: edonish-auto-mac
          - os: macos-latest
            target: macos-arm64
            output: edonish-auto-mac-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgl1-mesa-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libglu1-mesa-dev

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o ${{ matrix.output }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-${{ matrix.target }}
          path: ${{ matrix.output }}

  # ── Package .deb for Debian/Ubuntu ──────────────────────────
  package-deb:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: edonish-auto-linux-amd64
          path: build

      - name: Create .deb package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p deb/DEBIAN
          mkdir -p deb/usr/bin
          mkdir -p deb/usr/share/applications
          mkdir -p deb/usr/share/icons/hicolor/256x256/apps

          chmod +x build/edonish-auto
          cp build/edonish-auto deb/usr/bin/

          cat > deb/DEBIAN/control << EOF
          Package: edonish-auto
          Version: ${VERSION}
          Section: education
          Priority: optional
          Architecture: amd64
          Depends: libgl1, libxcursor1, libxrandr2, libxinerama1, libxi6, libxxf86vm1, libglu1-mesa
          Maintainer: Edonish Auto Team
          Description: eDonish Auto - Automated grade management
           Desktop application for automated grade management
           for the edonish.tj electronic journal system.
          EOF

          cat > deb/usr/share/applications/edonish-auto.desktop << EOF
          [Desktop Entry]
          Name=eDonish Auto
          Comment=Automated grade management for edonish.tj
          Exec=/usr/bin/edonish-auto
          Icon=edonish-auto
          Terminal=false
          Type=Application
          Categories=Education;
          EOF

          dpkg-deb --build deb edonish-auto_${VERSION}_amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-deb-amd64
          path: edonish-auto_*.deb

  # ── Package .rpm for Fedora/RHEL ────────────────────────────
  package-rpm:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: edonish-auto-linux-amd64
          path: build

      - name: Install rpm tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Create .rpm package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p rpm/BUILD
          mkdir -p rpm/RPMS
          mkdir -p rpm/SOURCES
          mkdir -p rpm/SPECS
          mkdir -p rpm/SRPMS

          chmod +x build/edonish-auto
          cp build/edonish-auto rpm/BUILD/

          cat > rpm/SPECS/edonish-auto.spec << 'SPEC'
          Name:           edonish-auto
          Version:        %{version}
          Release:        1%{?dist}
          Summary:        eDonish Auto - Automated grade management

          License:        Proprietary
          URL:            https://github.com/4codegit/EdonishAuto_Go

          Requires:       mesa-libGL libXcursor libXrandr libXinerama libXi libXxf86vm mesa-libGLU
          Provides:       edonish-auto = %{version}-%{release}

          %description
          Desktop application for automated grade management
          for the edonish.tj electronic journal system.

          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 755 %{_builddir}/edonish-auto %{buildroot}/usr/bin/edonish-auto

          mkdir -p %{buildroot}/usr/share/applications
          cat > %{buildroot}/usr/share/applications/edonish-auto.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=eDonish Auto
          Comment=Automated grade management for edonish.tj
          Exec=/usr/bin/edonish-auto
          Icon=edonish-auto
          Terminal=false
          Type=Application
          Categories=Education;
          DESKTOP

          %files
          /usr/bin/edonish-auto
          /usr/share/applications/edonish-auto.desktop

          %changelog
          SPEC

          rpmbuild --define "_topdir $(pwd)/rpm" \
            --define "_builddir $(pwd)/rpm/BUILD" \
            --define "version ${VERSION}" \
            --define "_build_name_fmt %%{NAME}-%%{VERSION}-%%{RELEASE}.%%{ARCH}.rpm" \
            -bb rpm/SPECS/edonish-auto.spec

          RPM_FILE=$(find rpm/RPMS -name "*.rpm" -type f | head -1)
          cp "${RPM_FILE}" edonish-auto_${VERSION}_x86_64.rpm

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-rpm-x86_64
          path: edonish-auto_*.rpm

  # ── Build Android .apk ──────────────────────────────────────
  package-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgl1-mesa-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev libglu1-mesa-dev

      - name: Install fyne command
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build Android APK
        run: |
          fyne package -os android -appID com.edonish.auto \
            -icon Icon.png \
            -name "eDonish Auto" \
            -version ${{ steps.version.outputs.VERSION }}

      - name: Find APK
        id: find_apk
        run: |
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" edonish-auto.apk
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifact
        if: steps.find_apk.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-android-apk
          path: edonish-auto.apk

  # ── Release: combine all artifacts ──────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build, package-deb, package-rpm, package-android]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List release files
        run: find dist -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          draft: false
