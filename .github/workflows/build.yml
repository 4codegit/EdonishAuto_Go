name: Build eDonish Auto Go Fyne

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from config
        id: version
        run: |
          VERSION=$(grep 'AppVersion' internal/config/config.go | awk -F'"' '{print $2}')
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxext-dev libxrender-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxtst-dev libgtk-3-dev libgdk-pixbuf2.0-dev libgl1-mesa-dev libdbus-1-dev libatk1.0-dev libatk-bridge2.0-dev libatspi2.0-dev rpm dpkg-dev gcc libc6-dev
      - name: Build Linux binary
        run: |
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${{ env.APP_VERSION }}" -o dist/linux/edonish-auto .
      - name: Report binary size
        run: |
          chmod +x dist/linux/edonish-auto
          SIZE=$(du -h dist/linux/edonish-auto | cut -f1)
          echo "Linux binary size: $SIZE"
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-linux
          path: dist/linux/edonish-auto

  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install MinGW
        run: choco install mingw -y
        shell: pwsh
      - name: Build Windows binary
        run: |
          $env:CGO_ENABLED="1"
          $env:CC="gcc"
          go build -ldflags "-s -w -H windowsgui -X main.version=${{ env.APP_VERSION }}" -o dist/windows/edonish-auto.exe .
        shell: pwsh
      - name: Create ZIP package
        run: |
          Compress-Archive -Path dist\windows\edonish-auto.exe -DestinationPath dist\windows\edonish-auto-${{ env.APP_VERSION }}-windows.zip -Force
        shell: pwsh
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: dist/windows/edonish-auto-${{ env.APP_VERSION }}-windows.zip

  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build macOS binary
        run: |
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.version=${{ env.APP_VERSION }}" -o dist/macos/edonish-auto .
      - name: Create ZIP package
        run: |
          chmod +x dist/macos/edonish-auto
          cd dist/macos
          zip edonish-auto-${{ env.APP_VERSION }}-macos.zip edonish-auto
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-macos
          path: dist/macos/edonish-auto-${{ env.APP_VERSION }}-macos.zip

  release:
    needs: [prepare, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.prepare.outputs.app_version }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: List all artifacts
        run: find release-artifacts -type f | head -30
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: eDonish Auto v${{ env.APP_VERSION }}
          body: |
            eDonish Auto v${{ env.APP_VERSION }} - Go + Fyne
            Automated grade management for edonish.tj
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
