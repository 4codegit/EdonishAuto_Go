name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run app once to cache Flet
        run: |
          Start-Process -FilePath "python" -ArgumentList "-c", "import flet; print('caching')" -Wait

      - name: Build GUI binary with PyInstaller
        run: |
          pyinstaller edonish-auto.spec --clean --noconfirm
        env:
          PYTHONWARNINGS: ignore

      - name: Build CLI binary
        run: |
          pyinstaller edonish-auto-cli.spec --clean --noconfirm

      - name: List dist
        run: |
          dir dist

      - name: Create ZIP package
        run: |
          if (Test-Path "dist\edonish-auto.exe") {
            Compress-Archive -Path dist\edonish-auto.exe,dist\edonish-auto-cli.exe -DestinationPath edonish-auto-windows.zip -Force
          } else {
            Write-Error "edonish-auto.exe not found"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows
          path: edonish-auto-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: edonish-auto-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
