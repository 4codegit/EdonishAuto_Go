name: Build Windows Go Fyne

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install MinGW
        run: choco install mingw -y
        shell: pwsh

      - name: Read version
        id: version
        run: |
          $content = Get-Content "internal/config/config.go" -Raw
          if ($content -match 'AppVersion\s*=\s*"([^"]+)"') {
            $ver = $Matches[1]
            echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
            echo "Version: $ver"
          } else {
            echo "APP_VERSION=0.4.0" >> $env:GITHUB_OUTPUT
            echo "Version: 0.4.0 (fallback)"
          }
        shell: pwsh

      - name: Build Windows binary
        run: |
          $env:CGO_ENABLED="1"
          $env:CC="gcc"
          go build -ldflags "-s -w -H windowsgui -X main.version=${{ steps.version.outputs.APP_VERSION }}" -o dist/edonish-auto.exe .
        shell: pwsh

      - name: Report binary size
        run: |
          $size = (Get-Item dist\edonish-auto.exe).Length / 1MB
          Write-Host "Windows binary size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      - name: Create ZIP package
        run: |
          Compress-Archive -Path dist\edonish-auto.exe -DestinationPath edonish-auto-${{ steps.version.outputs.APP_VERSION }}-windows.zip -Force
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edonish-auto-windows-standalone
          path: edonish-auto-${{ steps.version.outputs.APP_VERSION }}-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: edonish-auto-${{ steps.version.outputs.APP_VERSION }}-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
